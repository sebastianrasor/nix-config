[package]
name = "cheaters-swear-jar"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow = "1.0.102"
env = "1.0.1"
reqwest = { version = "0.12.19", features = ["json"] }
serde = "1.0.197"
serde_with = "3.12.0"
serenity = { version = "0.12.0", default-features = false, features = ["cache", "client", "gateway", "rustls_backend", "model"] }
tokio = { version = "1.26.0", features = ["macros", "rt-multi-thread"] }
tracing = "0.1.37"
tracing-subscriber = "0.3.23"
