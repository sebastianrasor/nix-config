[package]
name = "cheaters-swear-jar"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow = "1.0.102"
reqwest = { version = "0.13.4", features = ["json"] }
serde = "1.0.228"
serde_with = "3.21.0"
serenity = { version = "0.12.5", default-features = false, features = ["cache", "client", "gateway", "rustls_backend", "model"] }
tokio = { version = "1.52.3", features = ["macros", "rt-multi-thread"] }
tracing = "0.1.44"
tracing-subscriber = "0.3.23"
